name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: bitcoincashii/forge-pool

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Node image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/node
          file: ./docker/node/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-node:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Stratum image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/stratum/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-stratum:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-stratum:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update umbrel-app-store version
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          # Clone the app store repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/BitcoincashII/umbrel-app-store.git /tmp/app-store
          cd /tmp/app-store

          # Update version in umbrel-app.yml
          sed -i "s/version: .*/version: \"${{ steps.version.outputs.VERSION }}\"/" bch2-apps-forge-pool/umbrel-app.yml

          # Commit and push
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add bch2-apps-forge-pool/umbrel-app.yml
          git commit -m "Auto-update Forge Pool to v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin main
